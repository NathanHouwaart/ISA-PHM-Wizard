name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run backend integration lane
        required: false
        default: false
        type: boolean

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run test:run
      - run: npm run build

  integration:
    name: Integration
    needs: quality
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_integration) }}
    runs-on: ubuntu-latest
    env:
      RUN_BACKEND_INTEGRATION: "1"
      BACKEND_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Start local backend
        shell: bash
        run: |
          set -euo pipefail

          BACKEND_DIR="${RUNNER_TEMP}/ISA-PHM-Backend"
          git clone --depth 1 https://github.com/NathanHouwaart/ISA-PHM-Backend.git "${BACKEND_DIR}"
          cd "${BACKEND_DIR}"

          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          # Required by backend conversion script in most environments.
          python -m pip install isatools==0.14.2

          # Backend script invokes "python3.9"; provide a compatible shim on the runner.
          mkdir -p "${HOME}/.local/bin"
          cat > "${HOME}/.local/bin/python3.9" <<'SH'
          #!/usr/bin/env bash
          exec python "$@"
          SH
          chmod +x "${HOME}/.local/bin/python3.9"
          export PATH="${HOME}/.local/bin:${PATH}"

          # Determine local port from BACKEND_URL if provided.
          BACKEND_PORT="$(python - <<'PY'
          import os
          from urllib.parse import urlparse
          url = os.environ.get("BACKEND_URL", "http://localhost:8080")
          parsed = urlparse(url)
          print(parsed.port or 8080)
          PY
          )"

          if [ -f "app/main.py" ]; then
            BACKEND_APP_MODULE="app.main:app"
          elif [ -f "main.py" ]; then
            BACKEND_APP_MODULE="main:app"
          elif [ -f "src/main.py" ]; then
            BACKEND_APP_MODULE="src.main:app"
          else
            echo "Could not determine ASGI module. Expected app/main.py, main.py, or src/main.py"
            find . -maxdepth 3 -type f -name "main.py" -print || true
            exit 1
          fi

          echo "Starting backend with module ${BACKEND_APP_MODULE}"
          nohup python -m uvicorn "${BACKEND_APP_MODULE}" --host 127.0.0.1 --port "${BACKEND_PORT}" > "${RUNNER_TEMP}/backend.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/backend.pid"

          # Wait for backend readiness.
          for i in {1..45}; do
            if curl -fsS "http://127.0.0.1:${BACKEND_PORT}/openapi.json" > /dev/null; then
              echo "Backend is ready on port ${BACKEND_PORT}"
              exit 0
            fi
            sleep 1
          done

          echo "Backend failed to start in time. Log output:"
          cat "${RUNNER_TEMP}/backend.log" || true
          exit 1
      - run: npm ci
      - run: npm run test:integration
      - name: Print backend logs on failure
        if: ${{ failure() }}
        run: |
          echo "---- backend.log ----"
          cat "${RUNNER_TEMP}/backend.log" || true
      - name: Stop local backend
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -f "${RUNNER_TEMP}/backend.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/backend.pid")" || true
          fi
